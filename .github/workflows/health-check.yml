name: Health Check

on:
  push:
  pull_request:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate protocol repo
        run: python3 scripts/validate_protocol_repo.py
      - name: Validate JSON
        run: |
          python3 -m json.tool schemas/agent-router.schema.json >/dev/null
          python3 -m json.tool schemas/corpus-manifest.schema.json >/dev/null
          python3 -m json.tool templates/corpus-manifest.example.json >/dev/null
